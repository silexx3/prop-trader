name: Weekly digest

on:
  schedule:
    # Sundays 21:00 UTC — the week is done, the Monday coffee read gets written.
    - cron: "0 21 * * 0"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pandas yfinance requests

      - name: Write the week's digest
        run: python digest.py

      - name: Commit report
        run: |
          git config user.name "prop-trader-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/
          git diff --cached --quiet && echo "No digest changes." || git commit -m "Weekly digest $(date -u +%F)"
          git pull --rebase origin main
          git push

      - name: Ping phone on failure
        if: failure()
        run: |
          curl -s -m 5 -H "Title: Weekly digest FAILED" -H "Priority: high" -H "Tags: rotating_light" \
            -d "Digest workflow failed — check the Actions tab." \
            "https://ntfy.sh/${NTFY_TOPIC:-prop-trader-abhi-1a1c6d67741009ef}" || true
