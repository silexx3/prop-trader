name: Daily prop session

on:
  schedule:
    # 21:30 UTC ~ 4:30-5:30pm US Eastern depending on DST — after the close,
    # with buffer for the daily bar to actually be available.
    - cron: "30 21 * * 1-5"
  workflow_dispatch: {}  # manual "Run workflow" button in the Actions tab

permissions:
  contents: write

jobs:
  run-session:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # auto_session.py only needs the data stack, not streamlit —
      # keeps the runner install small and fast.
      - run: pip install pandas yfinance

      - name: Run today's session
        run: python auto_session.py

      - name: Run the Forward League
        run: python league.py

      - name: Commit updated ledgers
        run: |
          git config user.name "prop-trader-bot"
          git config user.email "actions@users.noreply.github.com"
          git add prop-experiment-ledger.json league/
          git diff --cached --quiet && echo "No ledger changes." || git commit -m "Auto session + league night $(date -u +%F)"
          git push
